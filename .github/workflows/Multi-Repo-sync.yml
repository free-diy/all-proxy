name: Multi-Repo Sync

on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch: 

jobs:
  sync-and-clean:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Destination
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Config Git Identity
        run: |
          git config --global user.name "Github-Action-Bot"
          git config --global user.email "action@github.com"

      - name: Sync Packages (Smart Version & Binary Priority)
        run: |
          # 1. 保护性清空当前仓库（保留必要的元数据文件）
          find . -maxdepth 1 ! -name '.git' ! -name '.github' ! -name 'README.md' ! -name 'README_zh.md' ! -name '.' -exec rm -rf {} +

          REPOS=(
            "https://github.com/Openwrt-Passwall/openwrt-passwall-packages:main"
            "https://github.com/Openwrt-Passwall/openwrt-passwall:main"
            "https://github.com/fw876/helloworld:master"
            "https://github.com/Openwrt-Passwall/openwrt-passwall2:main"
          )

          # 创建一个独立的隔离区
          mkdir -p .tmp_sync

          for REPO_CONF in "${REPOS[@]}"; do
            echo "================================================="
            if [[ "$REPO_CONF" =~ ^(.+):([^:]+)$ ]]; then
                REPO_URL="${BASH_REMATCH[1]}"
                TARGET_BRANCH="${BASH_REMATCH[2]}"
            else
                REPO_URL="$REPO_CONF"
                TARGET_BRANCH="master"
            fi
            echo "正在抓取: $REPO_URL ($TARGET_BRANCH)"

            # 2. 将上游克隆到隔离区，彻底杜绝 Git 文件套娃/合并
            rm -rf .tmp_sync/workspace
            git clone -b "$TARGET_BRANCH" --single-branch --depth 1 "$REPO_URL" .tmp_sync/workspace --quiet
            
            # 3. 剔除上游不需要的根目录文件
            rm -rf .tmp_sync/workspace/.git .tmp_sync/workspace/.github

            # 4. 【核心修复】智能版本与结构判断，移动包到根目录
            for pkg in .tmp_sync/workspace/*; do
              if [ -d "$pkg" ]; then
                pkg_name=$(basename "$pkg")
                
                # 如果根目录已经存在同名的包，执行智能判断
                if [ -d "./$pkg_name" ]; then
                  # 提取旧包信息
                  v_old="0"; [ -f "./$pkg_name/Makefile" ] && v_old=$(grep -m 1 -E "^PKG_VERSION:?=" "./$pkg_name/Makefile" | cut -d'=' -f2 | tr -d '[:space:]"') || true
                  is_old_bin=0; [ -d "./$pkg_name/files" ] && is_old_bin=1

                  # 提取新包信息
                  v_new="0"; [ -f "$pkg/Makefile" ] && v_new=$(grep -m 1 -E "^PKG_VERSION:?=" "$pkg/Makefile" | cut -d'=' -f2 | tr -d '[:space:]"') || true
                  is_new_bin=0; [ -d "$pkg/files" ] && is_new_bin=1

                  # 比较版本
                  HIGHER=$(printf '%s\n%s' "$v_old" "$v_new" | sort -V | tail -n1)

                  SHOULD_REPLACE=0
                  # 判定准则 1：版本确实更高
                  if [ "$v_new" != "$v_old" ] && [ "$HIGHER" == "$v_new" ]; then
                    SHOULD_REPLACE=1
                    echo "🆙 发现新版本 [$pkg_name]: $v_old -> $v_new"
                  # 判定准则 2：版本相同，但新包是二进制版(含files)而旧包不是
                  elif [ "$v_new" == "$v_old" ] && [ $is_new_bin -eq 1 ] && [ $is_old_bin -eq 0 ]; then
                    SHOULD_REPLACE=1
                    echo "💎 版本相同，优先选择二进制版结构 [$pkg_name]"
                  fi

                  if [ $SHOULD_REPLACE -eq 1 ]; then
                    # 连根拔起旧包，移入新包
                    rm -rf "./$pkg_name"
                    mv "$pkg" "./"
                  else
                    echo "⏭️ 跳过 [$pkg_name]: 保持当前更优版本"
                  fi
                else
                  # 如果不存在同名包，直接移入干干净净的最新包
                  mv "$pkg" "./"
                fi
              fi
            done
          done

          # 清理隔离区
          rm -rf .tmp_sync

      - name: Final Custom Cleanup
        run: |
          # 清除指定黑名单文件
          DELETE_LIST=(
            ".github"
            "LICENSE"
            "LICENSE.md"
            "COPYING"
            "README.md"
            "README_zh.md"
            ".gitignore"
            ".gitattributes"
            "docs"
            "test"
            "tests"
            "*.log"
          )

          echo "执行定向清理..."
          for ITEM in "${DELETE_LIST[@]}"; do
            if [[ "$ITEM" == "README.md" || "$ITEM" == "README_zh.md" || "$ITEM" == ".github" ]]; then
                # 对于 README 和 .github，保护根目录（-mindepth 2），只删插件内的
                find . -mindepth 2 -name "$ITEM" -exec rm -rf {} +
            else
                # 其他文件（如 test, docs, LICENSE），不论在哪全部删除
                find . -name "$ITEM" -exec rm -rf {} +
            fi
          done
          
          # 清理产生的空目录
          find . -type d -empty -delete || true

      - name: Commit and Push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add .
          # 强制保护 .github/workflows 下的脚本
          git checkout HEAD -- .github/workflows || true
          
          # 优化：只有当文件真正有变化时才推送，避免制造无效提交垃圾
          if ! git diff --staged --quiet; then
            git commit -m "Auto-Sync: $(date +'%Y-%m-%d %H:%M:%S') (Smart Version Priority)"
            git push "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:main --force
          else
            echo "仓库内容没有变化，跳过本次提交。"
          fi
