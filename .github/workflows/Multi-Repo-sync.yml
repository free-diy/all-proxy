name: Multi-Repo Sync

on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch: 

jobs:
  sync-and-clean:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Destination
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Config Git Identity
        run: |
          git config --global user.name "Github-Action-Bot"
          git config --global user.email "action@github.com"

      - name: Sync Packages (Smart Version Compare)
        run: |
          # 1. 保护性清空当前仓库
          find . -maxdepth 1 ! -name '.git' ! -name '.github' ! -name 'README.md' ! -name 'README_zh.md' ! -name '.' -exec rm -rf {} +

          REPOS=(
            "https://github.com/Openwrt-Passwall/openwrt-passwall-packages:main"
            "https://github.com/Openwrt-Passwall/openwrt-passwall:main"
            "https://github.com/fw876/helloworld:master"
            "https://github.com/Openwrt-Passwall/openwrt-passwall2:main"
          )

          mkdir -p .tmp_sync

          for REPO_CONF in "${REPOS[@]}"; do
            echo "================================================="
            if [[ "$REPO_CONF" =~ ^(.+):([^:]+)$ ]]; then
                REPO_URL="${BASH_REMATCH[1]}"
                TARGET_BRANCH="${BASH_REMATCH[2]}"
            else
                REPO_URL="$REPO_CONF"
                TARGET_BRANCH="master"
            fi
            echo "正在抓取: $REPO_URL ($TARGET_BRANCH)"

            # 2. 将上游克隆到隔离区
            rm -rf .tmp_sync/workspace
            git clone -b "$TARGET_BRANCH" --single-branch --depth 1 "$REPO_URL" .tmp_sync/workspace --quiet
            
            # 3. 剔除上游不需要的 Git 目录
            rm -rf .tmp_sync/workspace/.git .tmp_sync/workspace/.github

            # 4. 【核心逻辑：版本优胜劣汰】
            for pkg in .tmp_sync/workspace/*; do
              if [ -d "$pkg" ]; then
                pkg_name=$(basename "$pkg")
                
                if [ -d "./$pkg_name" ]; then
                  # 提取已存在包的版本号
                  v_old="0"
                  if [ -f "./$pkg_name/Makefile" ]; then
                    v_old=$(grep -m 1 -E "^PKG_VERSION:?=" "./$pkg_name/Makefile" | cut -d'=' -f2 | tr -d '[:space:]"') || true
                  fi
                  
                  # 提取新抓取包的版本号
                  v_new="0"
                  if [ -f "$pkg/Makefile" ]; then
                    v_new=$(grep -m 1 -E "^PKG_VERSION:?=" "$pkg/Makefile" | cut -d'=' -f2 | tr -d '[:space:]"') || true
                  fi

                  # 比较版本 (使用 sort -V 处理 1.2.10 > 1.2.2 的情况)
                  # 如果新版本 >= 旧版本，则替换
                  HIGHER=$(printf '%s\n%s' "$v_old" "$v_new" | sort -V | tail -n1)
                  
                  if [ "$HIGHER" == "$v_new" ]; then
                    echo "🆙 更新 [$pkg_name]: $v_old -> $v_new"
                    rm -rf "./$pkg_name"
                    mv "$pkg" "./"
                  else
                    echo "⏭️ 跳过 [$pkg_name]: 当前已是较新版本 $v_old"
                  fi
                else
                  # 根目录不存在此包，直接移入
                  mv "$pkg" "./"
                fi
              fi
            done
          done

          rm -rf .tmp_sync

      - name: Final Custom Cleanup
        run: |
          # 定义需要清理的“插件根目录垃圾”
          DELETE_LIST=(
            ".github"
            "LICENSE"
            "LICENSE.md"
            "COPYING"
            "README.md"
            "README_zh.md"
            ".gitignore"
            ".gitattributes"
            "docs"
            "test"
            "tests"
            "*.log"
          )

          echo "执行精确打击清理 (仅限插件一级目录)..."
          
          for ITEM in "${DELETE_LIST[@]}"; do
            # 【核心修改】
            # -mindepth 2: 跳过仓库根目录 (例如保留你自己的 README.md)
            # -maxdepth 2: 禁止进入插件的子目录 (例如保护 naiveproxy/src/test)
            find . -mindepth 2 -maxdepth 2 -name "$ITEM" -exec rm -rf {} +
          done
          
          # 清理产生的空目录（仅限一级插件目录下的空目录）
          find . -mindepth 2 -maxdepth 2 -type d -empty -delete || true

      - name: Commit and Push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add .
          git checkout HEAD -- .github/workflows || true
          
          if ! git diff --staged --quiet; then
            git commit -m "Auto-Sync: $(date +'%Y-%m-%d %H:%M:%S') (Smart Version Priority)"
            git push "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:main --force
          else
            echo "仓库内容没有变化，跳过本次提交。"
          fi
