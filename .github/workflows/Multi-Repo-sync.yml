name: Multi-Repo Sync

on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch: 

jobs:
  sync-and-clean:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Destination
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Config Git Identity
        run: |
          git config --global user.name "Github-Action-Bot"
          git config --global user.email "action@github.com"

      - name: Sync Packages (Strict Version & Repo Priority)
        run: |
          # 1. 清理当前工作目录（保留核心文件）
          find . -maxdepth 1 ! -name '.git' ! -name '.github' ! -name 'README.md' ! -name 'README_zh.md' ! -name '.' -exec rm -rf {} +

          # 仓库列表：排在前面的优先级最高（版本相同时保留前者）
          REPOS=(
            "https://github.com/Openwrt-Passwall/openwrt-passwall-packages:main"
            "https://github.com/Openwrt-Passwall/openwrt-passwall:main"
            "https://github.com/fw876/helloworld:master"
            "https://github.com/Openwrt-Passwall/openwrt-passwall2:main"
          )

          mkdir -p .tmp_sync

          for REPO_CONF in "${REPOS[@]}"; do
            echo "================================================="
            if [[ "$REPO_CONF" =~ ^(.+):([^:]+)$ ]]; then
                REPO_URL="${BASH_REMATCH[1]}"
                TARGET_BRANCH="${BASH_REMATCH[2]}"
            else
                REPO_URL="$REPO_CONF"
                TARGET_BRANCH="master"
            fi
            echo "正在处理上游: $REPO_URL ($TARGET_BRANCH)"

            # 2. 隔离克隆
            rm -rf .tmp_sync/workspace
            git clone -b "$TARGET_BRANCH" --single-branch --depth 1 "$REPO_URL" .tmp_sync/workspace --quiet
            
            # 剔除干扰目录
            rm -rf .tmp_sync/workspace/.git .tmp_sync/workspace/.github

            # 3. 核心比较逻辑
            for pkg in .tmp_sync/workspace/*; do
              if [ -d "$pkg" ]; then
                pkg_name=$(basename "$pkg")
                
                if [ -d "./$pkg_name" ]; then
                  # 提取旧包版本
                  v_old="0"
                  [ -f "./$pkg_name/Makefile" ] && v_old=$(grep -m 1 -E "^PKG_VERSION:?=" "./$pkg_name/Makefile" | cut -d'=' -f2 | tr -d '[:space:]"') || true
                  
                  # 提取新包版本
                  v_new="0"
                  [ -f "$pkg/Makefile" ] && v_new=$(grep -m 1 -E "^PKG_VERSION:?=" "$pkg/Makefile" | cut -d'=' -f2 | tr -d '[:space:]"') || true

                  # 比较逻辑：找出两者中的最高版本
                  HIGHER=$(printf '%s\n%s' "$v_old" "$v_new" | sort -V | tail -n1)
                  
                  # 关键判断：只有当新版本不等于旧版本，且新版本确实是更高版本时才更新
                  if [ "$v_new" != "$v_old" ] && [ "$HIGHER" == "$v_new" ]; then
                    echo "🆙 更新 [$pkg_name]: $v_old -> $v_new (来自 $REPO_URL)"
                    rm -rf "./$pkg_name"
                    mv "$pkg" "./"
                  else
                    echo "⏭️ 跳过 [$pkg_name]: 保持已有版本 $v_old (放弃 $REPO_URL 的相同或旧版本)"
                  fi
                else
                  # 根目录不存在此包，直接移入
                  mv "$pkg" "./"
                fi
              fi
            done
          done

          rm -rf .tmp_sync

      - name: Final Custom Cleanup
        run: |
          # 删除插件目录内部的多余杂物
          DELETE_LIST=(".github" "LICENSE" "LICENSE.md" "COPYING" "README.md" "README_zh.md" ".gitignore" ".gitattributes" "docs" "test" "tests" "*.log")
          
          echo "正在执行深度清理..."
          for ITEM in "${DELETE_LIST[@]}"; do
            find . -mindepth 2 -maxdepth 2 -name "$ITEM" -exec rm -rf {} +
          done
          
          # 清理插件目录下的空文件夹
          find . -mindepth 2 -maxdepth 2 -type d -empty -delete || true

      - name: Commit and Push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add .
          # 保护 workflow 自身不被意外改动
          git checkout HEAD -- .github/workflows || true
          
          if ! git diff --staged --quiet; then
            git commit -m "Auto-Sync: $(date +'%Y-%m-%d %H:%M:%S') (Strict Version Priority)"
            git push "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:main --force
          else
            echo "没有检测到任何实质性变化，跳过提交。"
          fi
